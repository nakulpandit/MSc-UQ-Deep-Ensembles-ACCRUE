seed: 2026

deep_ensemble:
  members: 5
  hidden_layers: [50]
  activation: relu
  epochs: 40
  batch_size: 32
  learning_rate: 0.001
  variance_floor: 1.0e-6

accrue:
  hidden_layers: [50, 10]
  restarts: 5
  optimizer: lbfgs
  max_epochs: 100
  lbfgs_iterations_per_epoch: 5
  patience: 10
  residual_mode_reproduction: in_sample
  residual_mode_comparison: cross_fit
  cross_fit_folds: 5
  sigma_floor: 1.0e-6

synthetic:
  g: {samples: 100, train_fraction: 0.33, validation_fraction: 0.33}
  y: {samples: 100, train_fraction: 0.33, validation_fraction: 0.33}
  w: {samples: 100, train_fraction: 0.33, validation_fraction: 0.33}
  5d: {samples: 10000, train_fraction: 0.33, validation_fraction: 0.33}
  independent_runs: 100

neural_run_modes:
  debug:
    runs: 1
    restarts: 1
    max_epochs: 3
    one_dimensional_samples: 100
    five_dimensional_samples: 500
  development:
    runs: 5
    restarts: 2
    max_epochs: 20
    one_dimensional_samples: 100
    five_dimensional_samples: 2000
  final:
    runs: 100
    restarts: 5
    max_epochs: 100
    one_dimensional_samples: 100
    five_dimensional_samples: 10000
